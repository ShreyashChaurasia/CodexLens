name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish (for example, v0.1.0)
        required: true
        default: v0.1.0
        type: string

permissions:
  contents: read

concurrency:
  group: pypi-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    name: Verify and build ${{ inputs.tag }}
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest

    steps:
      - name: Check out the trusted default-branch workflow context
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify published release and annotated tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"

          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be a stable version such as v0.1.0." >&2
            exit 1
          fi

          release="$(curl --fail-with-body --silent --show-error -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/tags/$tag")"

          test "$(jq -r '.tag_name' <<< "$release")" = "$tag"
          test "$(jq -r '.draft' <<< "$release")" = "false"
          test "$(jq -r '.prerelease' <<< "$release")" = "false"

          git fetch --no-tags origin "refs/tags/$tag:refs/tags/$tag"
          test "$(git cat-file -t "refs/tags/$tag")" = "tag"

          commit="$(git rev-parse "refs/tags/$tag^{}")"
          git checkout --detach "$commit"
          test "$(git rev-parse HEAD)" = "$commit"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install locked tag dependencies
        run: uv sync --all-groups --frozen

      - name: Verify tag and package versions agree
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(uv run python -c "from importlib.metadata import version; print(version('codexlens'))")"
          source_version="$(uv run python -c "from codexlens import __version__; print(__version__)")"

          test "$package_version" = "${RELEASE_TAG#v}"
          test "$source_version" = "$package_version"

      - name: Run quality checks
        run: |
          uv run ruff check .
          uv run pytest

      - name: Build distributions
        run: uv build --out-dir dist

      - name: Verify expected distributions exist
        shell: bash
        run: |
          set -euo pipefail
          test -n "$(find dist -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"

      - name: Upload distributions for the isolated publish job
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish verified distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/codexlens/
    permissions:
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
